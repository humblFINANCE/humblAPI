name: Test

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    name: Python ${{ matrix.python-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Test package
        run: uv run --frozen poe test

      # Lint runs but doesn't block merges yet: this repo's CI was broken
      # (devcontainer/docker-compose.yml never existed) for well over a
      # year, so a large amount of unrelated ruff/pre-commit debt
      # accumulated silently. Fixing all of it is a separate cleanup effort
      # from whatever change triggered this run - remove `continue-on-error`
      # once that debt is paid down.
      - name: Lint package
        run: uv run --frozen poe lint
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: reports/coverage.xml
